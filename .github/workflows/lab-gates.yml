name: DPA lab gates

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dpa-lab-gates-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lab-gates:
    name: lab-gates
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run deterministic lab gates
        run: python tools/validate_lab.py
